# Reverse proxy for the TrailMate API.
#
# On the VPS, terminate HTTPS here with Let's Encrypt: run certbot with the
# nginx plugin, which rewrites this server block to add the 443 listener and
# certificate paths, and redirects 80 -> 443. This file is the pre-TLS
# starting point.

upstream trailmate_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    # Max upload size for building images / QR posters via Supabase-bound
    # multipart requests.
    client_max_body_size 10M;

    location / {
        proxy_pass http://trailmate_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass http://trailmate_backend/health;
        access_log off;
    }
}
