services:
  db:
    image: postgis/postgis:16-3.4
    container_name: trailmate-db
    environment:
      POSTGRES_USER: trailmate
      POSTGRES_PASSWORD: trailmate
      POSTGRES_DB: trailmate
    ports:
      - "5432:5432"
    volumes:
      - trailmate_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trailmate -d trailmate"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  trailmate_pgdata:
